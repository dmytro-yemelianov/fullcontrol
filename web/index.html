<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FullControl &mdash; live WASM design viewer</title>
<style>
  :root{color-scheme:dark}
  html,body{margin:0;height:100%;background:#0e0e12;overflow:hidden;
            font-family:system-ui,-apple-system,sans-serif;color:#d7dae4}
  #ui{position:fixed;top:0;left:0;width:268px;padding:16px 18px;box-sizing:border-box;
      background:linear-gradient(180deg,#15151c 0%,#15151ccc 100%);height:100%;overflow:auto;
      backdrop-filter:blur(4px);border-right:1px solid #262631}
  h1{font-size:15px;margin:0 0 2px}
  .sub{font-size:11px;color:#7b8194;margin-bottom:16px}
  label{display:block;font-size:12px;margin:14px 0 4px;color:#aeb3c2}
  label .v{float:right;color:#fff;font-variant-numeric:tabular-nums}
  input[type=range]{width:100%;accent-color:#49b0ff}
  #stats{margin-top:20px;border-top:1px solid #262631;padding-top:14px;font-size:12px;line-height:1.7}
  #stats .row{display:flex;justify-content:space-between}
  #stats b{color:#fff;font-variant-numeric:tabular-nums}
  #stats .k{color:#8b91a3}
  #gcode-btn{margin-top:16px;width:100%;padding:8px;border:0;border-radius:6px;cursor:pointer;
             background:#2563c9;color:#fff;font-size:13px}
  #gcode-btn:disabled{background:#333;color:#888;cursor:default}
  #engine{margin-top:14px;font-size:11px;color:#5fd08a}
  #canvas-wrap{position:absolute;left:268px;top:0;right:0;bottom:0}
  #hint{position:fixed;bottom:10px;right:14px;color:#5b6173;font-size:11px}
</style>
</head>
<body>
<div id="ui">
  <h1>FullControl &times; WASM</h1>
  <div class="sub">twisted polygon vase &middot; geometry in JS, print metrics from the Rust kernel compiled to WebAssembly</div>

  <label>sides <span class="v" id="sides-v"></span></label>
  <input type="range" id="sides" min="3" max="10" step="1" value="5">

  <label>morph to sides <span class="v" id="morph-v"></span></label>
  <input type="range" id="morph" min="3" max="12" step="1" value="8">

  <label>twist (turns) <span class="v" id="twist-v"></span></label>
  <input type="range" id="twist" min="-2" max="2" step="0.05" value="0.75">

  <label>height (mm) <span class="v" id="height-v"></span></label>
  <input type="range" id="height" min="10" max="80" step="1" value="40">

  <label>radius (mm) <span class="v" id="radius-v"></span></label>
  <input type="range" id="radius" min="8" max="30" step="1" value="20">

  <label>nozzle (&deg;C) <span class="v" id="nozzle-v"></span></label>
  <input type="range" id="nozzle" min="180" max="250" step="5" value="210">

  <label>bed (&deg;C) <span class="v" id="bed-v"></span></label>
  <input type="range" id="bed" min="0" max="100" step="5" value="50">

  <div id="stats"></div>
  <button id="gcode-btn" disabled>&#10515; download printable g-code</button>
  <div id="engine">&#9679; kernel: loading&hellip;</div>
</div>
<div id="canvas-wrap"></div>
<div id="hint">drag to orbit &middot; scroll to zoom</div>

<script type="importmap">
{"imports":{
  "three":"https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import init, {simulate, emit_gcode} from './pkg/fullcontrol_kernel.js';

// ---- printer assumptions (match a generic FFF setup) ----
const EW = 0.8, EH = 0.3;                 // extrusion width / height (mm)
const AREA = EW * EH;                      // rectangle cross-section
const PRINT_SPEED = 1000, TRAVEL_SPEED = 8000;   // mm/min
const FIL_AREA = Math.PI * (1.75/2)**2;    // 1.75 mm filament
const VOL_TO_E = 1 / FIL_AREA;             // mm^3 deposited -> mm of feedstock
const CX = 50, CY = 50, LAYER_H = 0.24, FIRST_GAP = 0.8, SEGS = 128;

// ---- twisted polygon vase geometry (a JS port of examples/twisted_polygon_vase.py) ----
function ngonRadius(angle, sides, R){
  const sector = 2*Math.PI/sides, apothem = R*Math.cos(Math.PI/sides);
  const a = ((angle % sector) + sector) % sector;
  return apothem / Math.cos(a - sector/2);
}
function vasePoints(p){
  const total = Math.max(1, Math.floor((p.height/LAYER_H) * SEGS));
  const end = p.morph;
  const pts = new Float32Array((total+1)*3);
  for(let i=0;i<=total;i++){
    const ft = i/SEGS, angle = ft*2*Math.PI, h = ft*LAYER_H, f = Math.min(1, h/p.height);
    const twist = f*p.twist*2*Math.PI;
    const rA = ngonRadius(angle-twist, p.sides, p.radius);
    const r = end===p.sides ? rA : (1-f)*rA + f*ngonRadius(angle-twist, end, p.radius);
    pts[i*3] = CX + r*Math.cos(angle);
    pts[i*3+1] = CY + r*Math.sin(angle);
    pts[i*3+2] = h + FIRST_GAP;
  }
  return pts;
}

// ---- three.js scene ----
const wrap = document.getElementById('canvas-wrap');
const scene = new THREE.Scene(); scene.background = new THREE.Color(0x0e0e12);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(devicePixelRatio); wrap.appendChild(renderer.domElement);
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100000); camera.up.set(0,0,1);
const controls = new OrbitControls(camera, renderer.domElement); controls.enableDamping = true;
const grid = new THREE.GridHelper(120, 24, 0x33384a, 0x222533);
grid.rotation.x = Math.PI/2; scene.add(grid);
let lineObj = null;

function fitView(height, radius){
  const size = Math.max(height, radius*2, 1);
  controls.target.set(CX, CY, height/2 + FIRST_GAP);
  camera.position.set(CX + size*0.9, CY - size*1.4, height*0.7 + size*0.6);
  grid.position.set(CX, CY, FIRST_GAP);
}
function resize(){
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h); camera.aspect = w/h; camera.updateProjectionMatrix();
}
addEventListener('resize', resize);

function buildLine(pts, height){
  if(lineObj){ scene.remove(lineObj); lineObj.geometry.dispose(); lineObj.material.dispose(); }
  const n = pts.length/3;
  const colors = new Float32Array(pts.length);
  for(let i=0;i<n;i++){
    const f = (pts[i*3+2]-FIRST_GAP)/Math.max(height,1e-6);  // 0..1 up the height
    colors[i*3] = 0.0; colors[i*3+1] = 0.25+0.7*f; colors[i*3+2] = 1.0;  // blue -> cyan
  }
  const geom = new THREE.BufferGeometry();
  geom.setAttribute('position', new THREE.BufferAttribute(pts, 3));
  geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  lineObj = new THREE.Line(geom, new THREE.LineBasicMaterial({vertexColors:true}));
  scene.add(lineObj);
}

// ---- call the WASM kernel for the print metrics ----
function simMetrics(pts){
  const n = pts.length/3;
  const tag = new Int32Array(n).fill(0);          // all Point rows
  const a = new Float64Array(n), b = new Float64Array(n), c = new Float64Array(n);
  for(let i=0;i<n;i++){ a[i]=pts[i*3]; b[i]=pts[i*3+1]; c[i]=pts[i*3+2]; }
  const d = new Float64Array(n);
  // init context: [on, volume_to_e, print_speed, travel_speed, area, width, height, x, y, z]
  const init = new Float64Array([1, VOL_TO_E, PRINT_SPEED, TRAVEL_SPEED, AREA, EW, EH, NaN, NaN, NaN]);
  const m = simulate(tag, a, b, c, d, init);
  const out = {time:m.total_time_s, filament:m.filament_length, volume:m.extruded_volume,
               flow:m.max_flow_rate, segs:m.segment_count};
  m.free();
  return out;
}

const fmtTime = s => { const m = Math.round(s/60); return m>=60 ? `${(m/60).toFixed(1)} h` : `${m} min`; };

// ---- build a FULL serialized IR (procedures + toolpath) and let the WASM engine emit a
//      complete, printable g-code file (start gcode, heat-up, fan, toolpath, end gcode) ----
let currentPts = null;
const START_GCODE = '; FullControl design — full g-code generated in your browser by the Rust (WASM) engine\n'
                  + 'G28 ; home all axes\nG90 ; absolute coordinates';
const END_GCODE = 'M104 S0 ; hotend off\nM140 S0 ; bed off\nM107 ; fan off\nG28 X Y ; home x/y\nM84 ; motors off';

function buildFullIR(pts, nozzle, bed){
  const step = (type, data) => ({k:'step', type, data});
  const events = [
    step('ManualGcode', {text: START_GCODE}),
    step('Buildplate', {temp: bed, wait: false}), step('Hotend', {temp: nozzle, wait: false}),
    step('Buildplate', {temp: bed, wait: true}),  step('Hotend', {temp: nozzle, wait: true}),
    step('Fan', {speed_percent: 100}),
    step('Extruder', {relative_gcode: true}),
    // travel to the first point, then the extruding toolpath
    {k:'segment', start:[null,null,null], end:[pts[0],pts[1],pts[2]], travel:true,
     speed:TRAVEL_SPEED, length:0, filament_length:0, kind:'line'},
  ];
  for(let i=1;i<pts.length/3;i++){
    const sx=pts[(i-1)*3], sy=pts[(i-1)*3+1], sz=pts[(i-1)*3+2];
    const ex=pts[i*3], ey=pts[i*3+1], ez=pts[i*3+2];
    const len = Math.hypot(ex-sx, ey-sy, ez-sz);
    events.push({k:'segment', start:[sx,sy,sz], end:[ex,ey,ez], travel:false,
                 speed:PRINT_SPEED, length:len, filament_length:len*AREA*VOL_TO_E, kind:'line'});
  }
  events.push(step('ManualGcode', {text: END_GCODE}));
  return JSON.stringify({version:1, events});
}

function downloadGcode(){
  if(!currentPts) return;
  const nozzle = +document.getElementById('nozzle').value, bed = +document.getElementById('bed').value;
  const ir = buildFullIR(currentPts, nozzle, bed);
  const params = JSON.stringify({relative_e:false, travel_g1_e0:false, flavor:'marlin',
                                 retraction_distance:0, retraction_speed:0, command_list:{}});
  const t0 = performance.now();
  const lines = emit_gcode(ir, params);                 // full file, in Rust/wasm
  const dt = (performance.now()-t0).toFixed(1);
  const file = lines.join('\n') + '\n';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([file], {type:'text/plain'}));
  a.download = 'design.gcode'; a.click(); URL.revokeObjectURL(a.href);
  document.getElementById('engine').innerHTML =
    `&#9679; Rust engine (wasm) emitted a ${(file.length/1024|0).toLocaleString()} KB printable file in ${dt} ms`;
}

function update(){
  const p = {
    sides:+sides.value, morph:+morph.value, twist:+twist.value,
    height:+height.value, radius:+radius.value
  };
  for(const k of ['sides','morph','twist','height','radius','nozzle','bed'])
    document.getElementById(k+'-v').textContent = document.getElementById(k).value;
  const pts = vasePoints(p);
  currentPts = pts;
  buildLine(pts, p.height);
  fitView(p.height, p.radius);
  const t0 = performance.now();
  const m = simMetrics(pts);
  const dt = (performance.now()-t0).toFixed(2);
  document.getElementById('stats').innerHTML =
    `<div class="row"><span class="k">print time</span><b>${fmtTime(m.time)}</b></div>`+
    `<div class="row"><span class="k">filament</span><b>${m.filament.toFixed(0)} mm</b></div>`+
    `<div class="row"><span class="k">material</span><b>${(m.volume/1000).toFixed(1)} cm&sup3;</b></div>`+
    `<div class="row"><span class="k">peak flow</span><b>${m.flow.toFixed(2)} mm&sup3;/s</b></div>`+
    `<div class="row"><span class="k">segments</span><b>${m.segs.toLocaleString()}</b></div>`;
  document.getElementById('engine').innerHTML =
    `&#9679; Rust kernel (wasm) simulated ${m.segs.toLocaleString()} segments in ${dt} ms`;
}

(async function main(){
  await init();                       // load the wasm module
  for(const id of ['sides','morph','twist','height','radius'])
    document.getElementById(id).addEventListener('input', update);
  for(const id of ['nozzle','bed'])
    document.getElementById(id).addEventListener('input',
      e => document.getElementById(id+'-v').textContent = e.target.value);
  const btn = document.getElementById('gcode-btn');
  btn.disabled = false; btn.addEventListener('click', downloadGcode);
  resize(); update();
  (function loop(){ requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();
})();
</script>
</body>
</html>
