name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Run unit tests
        run: pytest tests/unit -q

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check .

  build:
    name: build (sdist + wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build
      - run: python -m build

  kernel:
    name: rust kernel (fmt + clippy + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Rust format check
        working-directory: rust_kernel
        run: cargo fmt --check
      - name: Clippy (deny warnings)
        working-directory: rust_kernel
        run: cargo clippy --release -- -D warnings
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
      - name: Build + install the kernel (maturin PEP 517 backend)
        run: pip install ./rust_kernel
      - name: Run the kernel conformance tests
        run: pytest tests/unit/test_rust_kernel.py -q
